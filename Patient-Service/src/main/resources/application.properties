# ---------------------------
# CONFIGURATION DE L'APPLICATION
# ---------------------------
# NOTE: Ces configurations servent de FALLBACK si le Config Server n'est pas disponible
# En production, ces configurations devraient venir du Config Server
# Voir : Config-server/config-repo/patient-service.properties
# ---------------------------
spring.application.name=patient-service
server.port=8081
spring.main.allow-bean-definition-overriding=true

# Local secrets: Patient-Service/.env (gitignored). Run mvnw from the Patient-Service directory.
spring.config.import=optional:file:.env[.properties]

# ---------------------------
# CONFIG SERVER CONFIGURATION
# ---------------------------
# La configuration du Config Server est dans bootstrap.properties
# Si le Config Server n'est pas disponible, l'application utilisera
# les valeurs ci-dessous comme fallback
# NOTE: Le Config Server a été supprimé pour un déploiement K8s natif.

# ---------------------------
# MONGODB
# ---------------------------
spring.data.mongodb.uri=mongodb://localhost:27017/MaBase
logging.level.org.mongodb.driver=WARN
logging.level.org.springframework.data.mongodb=INFO

# ---------------------------
# JWT (set JWT_SECRET / JWT_EXPIRATION in .env or environment)
# ---------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ---------------------------
# RABBITMQ
# ---------------------------
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.connection-timeout=60000
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=10
spring.rabbitmq.listener.simple.prefetch=1

# ---------------------------
# JACKSON
# ---------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=UTC

# ---------------------------
# LOGGING
# ---------------------------
logging.level.com.patient_service=DEBUG
logging.level.org.springframework.amqp=DEBUG

# ---------------------------
# SWAGGER / OPENAPI
# ---------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operationsSorter=alpha
springdoc.packages-to-scan=com.patient_service.controllers


# ---------------------------
# SERVICE URLs
# ---------------------------
medicalrecord.service.url=http://localhost:8083
request.service.url=http://localhost:8084

# ---------------------------
# EMAIL CONFIGURATION
# ---------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_FROM}
