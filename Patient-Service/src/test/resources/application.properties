# Test configuration
spring.application.name=patient-service-test
server.port=0

# MongoDB Mock (using a mock or disabling if possible, but usually just pointing to non-existent or memory)
spring.data.mongodb.uri=mongodb://localhost:27017/test

# JWT
jwt.secret=testSecretKey123456789012345678901234567890
jwt.expiration=3600000

# RabbitMQ (disabling for unit tests)
spring.rabbitmq.host=localhost
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Eureka
eureka.client.enabled=false
spring.cloud.config.enabled=false

# Service URLs
medicalrecord.service.url=http://localhost:8083
request.service.url=http://localhost:8084

# Mail
spring.mail.host=localhost
spring.mail.port=25
spring.mail.from=test@example.com
